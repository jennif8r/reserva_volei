name: Reserva Automática

on:
  schedule:
    - cron: "*/15 * * * *"  
  workflow_dispatch:

jobs:
  reservar:
    runs-on: ubuntu-latest

    env:
      RESERVA_ACCOUNTS_JSON: ${{ secrets.RESERVA_ACCOUNTS_JSON }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

      
      TARGET_HOURS_JSON: '["13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00"]'

      ACCEPTED_WINDOWS_JSON: '[["16:00","17:00","18:00"],["17:00","18:00","19:00"],["18:00","19:00","20:00"],["19:00","20:00","21:00"],["12:00","13:00","14:00"],["13:00","14:00","15:00"],["14:00","15:00","16:00"]]'

      MIN_WINDOW_SIZE: "3"
      MAX_WINDOW_SIZE: "5"
      LOOKAHEAD_WEEKS: "8"

      ACTIVITY_NAME: "Voleibol"
      REGIONAL_NAME: "Unidade Regional Matriz"
      UNIT_NAME: "CENTRO DE ESPORTE E LAZER DIRCEU GRAESER"
      CAPACITY: "8"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Rodar bot
        run: python main.py

      - name: Salvar estado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json || true
          git commit -m "update state" || echo "sem mudanças"
          git push

      - name: Upload debug (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: artifacts/