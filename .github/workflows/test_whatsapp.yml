name: Teste WhatsApp Connection

on:
  workflow_dispatch:

jobs:
  test_whatsapp:
    runs-on: ubuntu-latest

    env:
      # Evolution API Configs
      EVOLUTION_API_URL: ${{ secrets.URL_EVOLUTION }}
      EVOLUTION_API_INSTANCE: "volei-test"
      EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
      WHATSAPP_GROUP_JID: ${{ secrets.NUMERO_CELULAR }}
 
      # Dummy values for required config fields (to avoid Config initialization error)
      RESERVA_ACCOUNTS_JSON: '[]'
      MIN_WINDOW_SIZE: "2"
      MAX_WINDOW_SIZE: "5"
      LOOKAHEAD_WEEKS: "8"
      TARGET_HOURS_JSON: '[]'
      ACTIVITY_NAME: "Test"
      REGIONAL_NAME: "Test"
      UNIT_NAME: "Test"
      CAPACITY: "8"
      URL: "http://test.com"
      ACCEPTED_WINDOWS_JSON: '[]'
      SMTP_SERVER: "smtp.test.com"
      SMTP_PORT: "587"
      SMTP_USER: "test"
      SMTP_PASS: "test"
      NOTIFY_TO: "test@test.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Rodar Teste WhatsApp
        run: python test_whatsapp.py
