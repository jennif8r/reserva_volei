name: Reservar Vôlei

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  reservar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      RESERVA_ACCOUNTS_JSON: ${{ secrets.RESERVA_ACCOUNTS_JSON }}

      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

      ACTIVITY_NAME: ${{ vars.ACTIVITY_NAME }}
      REGIONAL_NAME: ${{ vars.REGIONAL_NAME }}
      UNIT_NAME: ${{ vars.UNIT_NAME }}
      CAPACITY: ${{ vars.CAPACITY }}

      TARGET_HOURS_JSON: ${{ vars.TARGET_HOURS_JSON }}
      ACCEPTED_WINDOWS_JSON: ${{ vars.ACCEPTED_WINDOWS_JSON }}
      MIN_WINDOW_SIZE: ${{ vars.MIN_WINDOW_SIZE }}
      MAX_WINDOW_SIZE: ${{ vars.MAX_WINDOW_SIZE }}
      LOOKAHEAD_WEEKS: ${{ vars.LOOKAHEAD_WEEKS }}

      URL: ${{ vars.URL }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Garantir state.json
        run: |
          if [ ! -f state.json ]; then
            echo '{"reservations":[]}' > state.json
          fi

      - name: Executar automação
        run: python main.py

      - name: Commit do state.json atualizado
        run: |
          if git diff --quiet -- state.json; then
            echo "Sem mudanças no state.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json
          git commit -m "Atualiza state.json [skip ci]"
          git push

      - name: Salvar artifacts de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reserva-debug
          path: |
            artifacts/
            debug_login.png
            debug_login.html
            debug_availability.png
            debug_availability.html
          if-no-files-found: ignore