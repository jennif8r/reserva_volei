name: Reserva Automática

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  reservar:
    runs-on: ubuntu-latest

    env:
      RESERVA_ACCOUNTS_JSON: ${{ secrets.RESERVA_ACCOUNTS_JSON }}

      TARGET_HOURS_JSON: ${{ vars.TARGET_HOURS_JSON }}
      ACCEPTED_WINDOWS_JSON: ${{ vars.ACCEPTED_WINDOWS_JSON }}
      MIN_WINDOW_SIZE: ${{ vars.MIN_WINDOW_SIZE }}
      MAX_WINDOW_SIZE: ${{ vars.MAX_WINDOW_SIZE }}

      ACTIVITY_NAME: ${{ vars.ACTIVITY_NAME }}
      REGIONAL_NAME: ${{ vars.REGIONAL_NAME }}
      UNIT_NAME: ${{ vars.UNIT_NAME }}
      CAPACITY: ${{ vars.CAPACITY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Rodar bot
        run: python main.py

      - name: Salvar estado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json || true
          git commit -m "update state" || echo "sem mudanças"
          git push